<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        padding-top: 50px;
      }
      #value {
        font-size: 6rem;
        font-weight: bold;
        transition: all 0.3s;
      }
      button {
        padding: 10px 25px;
        font-size: 1.2rem;
        cursor: pointer;
        margin: 5px;
        border-radius: 5px;
      }
      .btn-inc {
        background-color: #4caf50;
        color: white;
        border: none;
      }
      .btn-dec {
        background-color: #f44336;
        color: white;
        border: none;
      }
      .btn-reset {
        background-color: #555;
        color: white;
        border: none;
      }
    </style>
  </head>
  <body>
    <h1>Learn LocalStorage</h1>

    <h1>Smart Counter (with Persistence)</h1>
    <div id="value">0</div>

    <button class="btn-dec">Decrement (-)</button>
    <button class="btn-reset">Reset</button>
    <button class="btn-inc">Increment (+)</button>

    <!-- js file  -->
    <!-- <script src="./index.js"></script> -->
     <script src="./LocalStorage.js"></script>
  </body>
</html>
