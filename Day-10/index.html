<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Error Handling Practice</title>
    <style>
        #loader { display: none; color: blue; font-weight: bold; }
        #error-box { display: none; color: white; background: red; padding: 10px; margin-top: 10px; }
        #data-container { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>User List: (Api Fetch)</h1>

    <button id="fetch-btn">Load Data</button>


    <!-- loading state UI -->
     <div id="loader">Loading Data, Please Wait...</div>

     <!-- error message -->
      <div id="error-box"></div>


     <!-- data dekhanor jaygay -->
      <div id="data-container"></div>

      <!-- js file -->
       <script src="./script.js"></script>
</body>
</html>
